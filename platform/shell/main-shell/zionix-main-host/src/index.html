<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Zionix Solutions</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- <link rel="icon" type="image/x-icon" href="favicon.ico" /> -->
    <link rel="icon" type="image/x-icon" href="./assets/zionix-logo.svg" />

    <!-- Initial theme-matching styles to prevent white screen flash -->
    <style>
      /* CSS Custom Properties for dynamic theming */
      :root {
        --loader-primary: #0565ff;
        --loader-primary-light: ##0565ff;
        --loader-primary-shadow: rgba(206, 199, 250, 0.2);
        --loader-bg: #ffffff;
        --loader-text: #444444;
        --loader-bar-bg: #e0e0e0;
      }

      /* Dark mode overrides */
      [data-theme='dark'] {
        --loader-bg: #141414;
        --loader-text: #e0e0e0;
        --loader-bar-bg: #2a2a2a;
      }

      /* Reset and base styles */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI',
          'Helvetica Neue', Arial, sans-serif;
        background: var(--loader-bg);
        color: var(--loader-text);
        overflow: hidden; /* Prevent scrollbars during initial load */
      }

      #main-module {
        height: 100vh;
        width: 100vw;
        background: var(--loader-bg);
      }

      /* Initial loading animation with theme colors */
      .initial-loading {
        position: fixed;
        inset: 0;
        background: var(--loader-bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: clamp(1rem, 5vw, 2rem);
        text-align: center;
        z-index: 9999;
      }

      /* Logo/Brand name */
      .initial-brand {
        font-size: clamp(2rem, 6vw, 3.5rem);
        font-weight: 700;
        color: var(--loader-primary);
        margin-bottom: clamp(2rem, 5vw, 3rem);
        letter-spacing: -0.02em;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI',
          sans-serif;
      }

      /* Premium bar loader */
      .initial-bar {
        width: clamp(200px, 80vw, 400px);
        height: clamp(3px, 0.8vw, 4px);
        background: var(--loader-bar-bg);
        border-radius: clamp(2px, 0.5vw, 4px);
        position: relative;
        overflow: hidden;
        margin-bottom: clamp(0.5rem, 1.5vw, 1rem);
      }

      .initial-bar::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 40%;
        background: linear-gradient(
          90deg,
          transparent,
          var(--loader-primary),
          var(--loader-primary),
          transparent
        );
        border-radius: clamp(2px, 0.5vw, 4px);
        animation: shimmer 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        box-shadow: 0 0 clamp(8px, 2vw, 12px) var(--loader-primary-shadow);
      }

      .initial-text {
        margin-top: clamp(0.5rem, 2vw, 1rem);
        font-size: clamp(0.875rem, 2.5vw, 1rem);
        color: var(--loader-text);
        font-weight: 400;
        letter-spacing: 0.3px;
        opacity: 0.7;
      }

      @keyframes shimmer {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(350%);
        }
      }

      /* Smooth transition when React takes over */
      .fade-out {
        opacity: 0;
        transition: opacity 0.3s ease-out;
      }
    </style>
    <script>
      // Apply theme settings from localStorage dynamically
      (function () {
        try {
          // Check dark mode
          const isDarkMode =
            localStorage.getItem('zionix-theme-mode') === 'dark';
          if (isDarkMode) {
            document.documentElement.setAttribute('data-theme', 'dark');
          }

          // Apply primary color
          const savedColor = localStorage.getItem('zionix-theme-primary-color');
          if (savedColor) {
            // Convert hex to rgba for shadow
            const hexToRgba = (hex, alpha) => {
              const r = parseInt(hex.slice(1, 3), 16);
              const g = parseInt(hex.slice(3, 5), 16);
              const b = parseInt(hex.slice(5, 7), 16);
              return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            };

            // Update CSS custom properties
            document.documentElement.style.setProperty(
              '--loader-primary',
              savedColor
            );
            document.documentElement.style.setProperty(
              '--loader-primary-light',
              savedColor + 'dd'
            );
            document.documentElement.style.setProperty(
              '--loader-primary-shadow',
              hexToRgba(savedColor, 0.2)
            );
          }
        } catch (e) {
          // Ignore errors, use default values
        }
      })();
    </script>
  </head>
  <body>
    <div id="main-module">
      <!-- Initial loading state that shows immediately -->
      <div id="html-loader" class="initial-loading">
        <div class="initial-brand">Zionix</div>
        <div class="initial-bar"></div>
        <div class="initial-text">Loading your workspace…</div>
      </div>
    </div>

    <script>
      // Remove HTML loader when React is ready
      window.addEventListener('DOMContentLoaded', function () {
        // This will be called when the DOM is ready
        // The actual removal will be handled by main.jsx
      });
    </script>
  </body>
</html>
